<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Code Forum</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="card">
    <div class="titlebar">
      <button class="minimize">
        <svg viewBox="0 0 10 10"><rect x="1" y="4" width="8" height="2"/></svg>
      </button>
      <button class="maximize">
        <svg viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8"/></svg>
      </button>
      <button class="close">
        <svg viewBox="0 0 10 10"><polygon points="1,1 9,9 9,1 1,9"/></svg>
      </button>
    </div>

    <!-- Add Block Form -->
    <form method="POST" class="form" action="/">
      <div class="radio-group">
        <label><input type="radio" name="type" value="code" checked> Code</label>
        <label><input type="radio" name="type" value="text"> Text</label>
      </div>
      <textarea name="content" rows="6" cols="60" placeholder="Write your block here..."></textarea>

      <!-- Buttons Row -->
      <div class="button-row">
        <button type="submit" class="submit-button">Add&nbsp;Block</button>

        <form method="POST" action="/delete-last-block">
          <button type="submit" class="submit-button delete-button" {{if not .HasBlocks}}disabled{{end}}>
            Delete&nbsp;Last&nbsp;Block
          </button>
        </form>
      </div>
    </form>

    <!-- Display Blocks -->
    <div id="pre">
      {{range .Blocks}}
        {{if eq .Type "code"}}
          <div class="code-string">{{.Content}}</div>
        {{else}}
          <div class="text-string">{{.Content}}</div>
        {{end}}
      {{end}}
    </div>
  </div>
</body>
</html>
