<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programming Languages Toolbar</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: #0e0015;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      padding: 20px;
    }
    
    .container {
      background: #15001f;
      border: 1px solid #c042ff;
      box-shadow: 0 0 30px #c042ff60;
      border-radius: 10px;
      overflow: hidden;
      width: 100%;
      max-width: 900px;
      padding: 0;
      height: 900px;
    }
    
    .titlebar {
      background: linear-gradient(90deg, #2e0043, #3d0057);
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding: 8px 12px;
      gap: 8px;
    }
    
    .titlebar button {
      width: 28px;
      height: 24px;
      border: 0;
      outline: 0;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    
    .close:hover {
      background-color: #e81123;
    }
    
    .maximize:hover,
    .minimize:hover {
      background-color: #c042ff2e;
    }
    
    .content {
      padding: 25px;
    }
    
    h4 {
      color: #d6b2ff;
      margin-bottom: 15px;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
    }
    
    h4::before {
      content: "→";
      margin-right: 10px;
      color: #c042ff;
    }
    
    /* Programming Languages Header with Hover */
    .languages-header {
      display: inline-block;
      position: relative;
      cursor: pointer;
      padding: 10px 15px;
      background: linear-gradient(145deg, #2a0040, #200030);
      border: 1px solid #5c2a82;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    
    .languages-header:hover {
      background: linear-gradient(145deg, #33004f, #28003d);
      border-color: #c042ff;
    }
    
    /* Main categories dropdown - FIXED */
    .categories-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      background: #220032;
      border: 1px solid #c042ff;
      border-radius: 6px;
      box-shadow: 0 5px 15px rgba(192, 66, 255, 0.3);
      min-width: 200px;
      z-index: 100;
      display: none;
      padding: 10px;
      flex-direction: column;
    }
    
    .languages-header:hover .categories-dropdown {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    /* Category items */
    .category-item {
      padding: 10px;
      background: linear-gradient(145deg, #2a0040, #200030);
      border: 1px solid #5c2a82;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
    }
    
    .category-item:hover {
      background: linear-gradient(145deg, #33004f, #28003d);
      border-color: #c042ff;
    }


    /* ------------------------------------------------------------ */
    
    /* Languages dropdown */
    .languages-dropdown {
      position: absolute;
      left: 100%;
      top: 0;
      background: #220032;
      border: 1px solid #c042ff;
      border-radius: 6px;
      box-shadow: 0 5px 15px rgba(192, 66, 255, 0.3);
      min-width: 150px;
      display: none;
      padding: 10px;
      z-index: 101;
    }
    
    .category-item:hover .languages-dropdown {
      display: block;
    }
    
    /* Language items with checkboxes */
    .language-option {
      display: block;
      padding: 8px 12px;
      background: linear-gradient(145deg, #220032, #1a0026);
      border: 1px solid #4a1a6b;
      border-radius: 6px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }
    
    .language-option:hover {
      background: linear-gradient(145deg, #c042ff, #9c2bff);
      border-color: #c042ff;
      transform: translateY(-2px);
    }
    
    /* Hide the actual checkbox */
    .language-option input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
      height: 0;
      width: 0;
    }
    
    /* Selected state using :checked pseudo-class */
    .language-option input:checked ~ span {
      color: #ffffff;
      font-weight: 600;
    }
    
    /* Visual indicator for selected state */
    .language-option input:checked ~ .selected-indicator {
      opacity: 1;
    }
    
    .language-option input:checked {
      background: linear-gradient(145deg, #c042ff, #9c2bff);
      border-color: #c042ff;
    }
    
    /* Selected indicator (replaces checkbox visually) */
    .selected-indicator {
      position: absolute;
      right: 10px;
      width: 14px;
      height: 14px;
      background: #ffffff;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    /* Visual feedback for checked state using CSS only */
    .language-option input:checked + span {
      background: linear-gradient(145deg, #c042ff, #9c2bff);
      border-color: #c042ff;
      box-shadow: 0 5px 15px rgba(192, 66, 255, 0.4);
    }
    
    /* Selected languages display */
    .selected-languages {
      margin-top: 25px;
      padding: 15px;
      background: linear-gradient(145deg, #220032, #1a0026);
      border: 1px solid #4a1a6b;
      border-radius: 8px;
    }
    
    .selected-languages h5 {
      color: #c042ff;
      margin-bottom: 10px;
      font-size: 16px;
    }
    
    .selected-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .selected-item {
      background: linear-gradient(145deg, #c042ff, #9c2bff);
      padding: 5px 12px;
      border-radius: 15px;
      font-size: 14px;
      display: flex;
      align-items: center;
    }
    
    .no-selection {
      color: #888;
      font-style: italic;
    }
    
    /* Instructions */
    .instructions {
      color: #a78bba;
      font-size: 14px;
      margin-top: 10px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="titlebar">
      <button class="minimize">−</button>
      <button class="maximize">+</button>
      <button class="close">×</button>
    </div>
    
    <div class="content">
      <h4>Programming Languages:</h4>
      
      <div class="languages-header">
        Select Programming Languages ▾
        <div class="categories-dropdown">
          <!-- Web Development -->
          <div class="category-item">
            Web Development ▸
            <div class="languages-dropdown">
              <label class="language-option">
                <input type="checkbox" name="language" value="javascript">
                <span>JavaScript</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="typescript">
                <span>TypeScript</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="html">
                <span>HTML</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="css">
                <span>CSS</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="php">
                <span>PHP</span>
                <span class="selected-indicator"></span>
              </label>
            </div>
          </div>
          
          <!-- Mobile Development -->
          <div class="category-item">
            Mobile Development ▸
            <div class="languages-dropdown">
              <label class="language-option">
                <input type="checkbox" name="language" value="swift">
                <span>Swift</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="kotlin">
                <span>Kotlin</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="dart">
                <span>Dart</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="flutter">
                <span>Flutter</span>
                <span class="selected-indicator"></span>
              </label>
            </div>
          </div>
          
          <!-- Systems Programming -->
          <div class="category-item">
            Systems Programming ▸
            <div class="languages-dropdown">
              <label class="language-option">
                <input type="checkbox" name="language" value="golang">
                <span>Golang</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="rust">
                <span>Rust</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="c">
                <span>C</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="cpp">
                <span>C++</span>
                <span class="selected-indicator"></span>
              </label>
            </div>
          </div>
          
          <!-- General Purpose -->
          <div class="category-item">
            General Purpose ▸
            <div class="languages-dropdown">
              <label class="language-option">
                <input type="checkbox" name="language" value="java">
                <span>Java</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="csharp">
                <span>C#</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="python">
                <span>Python</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="ruby">
                <span>Ruby</span>
                <span class="selected-indicator"></span>
              </label>
            </div>
          </div>
          
          <div class="category-item">
            Data & Science ▸
            <div class="languages-dropdown">
              <label class="language-option">
                <input type="checkbox" name="language" value="r">
                <span>R</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="matlab">
                <span>MATLAB</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="julia">
                <span>Julia</span>
                <span class="selected-indicator"></span>
              </label>
              <label class="language-option">
                <input type="checkbox" name="language" value="sql">
                <span>SQL</span>
                <span class="selected-indicator"></span>
              </label>
            </div>
          </div>
        </div>
      </div>
      
      <!-- <div class="selected-languages">
        <h5>Selected Languages:</h5>
        <div class="selected-items">
          <div class="no-selection">No languages selected yet</div>
          <div class="instructions">Check languages in the dropdown menus to select them</div>
        </div>
      </div> -->
    </div>
  </div>
</body>
</html>
