<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>
</head>

<body>
    <h1>Create a New Post</h1>
    <form action="/posts" method="POST">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required>
        <label for="content">Content:</label>
        <textarea id="content" name="content" required></textarea>

        <label for="category">Choose a category:</label>
        <div>
            <input type="checkbox" id="html" name="category" value="html">
            <label for="html">HTML</label>
        </div>
        <div>
            <input type="checkbox" id="css" name="category" value="css">
            <label for="css">CSS</label>
        </div>
        <div>
            <input type="checkbox" id="java" name="category" value="java">
            <label for="java">Java</label>
        </div>
        <div>
            <input type="checkbox" id="python" name="category" value="python">
            <label for="python">Python</label>
        </div>
        <div>
            <input type="checkbox" id="javascript" name="category" value="javascript">
            <label for="javascript">JavaScript</label>
        </div>
        <div>
            <input type="checkbox" id="golang" name="category" value="golang">
            <label for="golang">Golang</label>
        </div>
        <div>
            <input type="checkbox" id="cpp" name="category" value="cpp">
            <label for="cpp">C++</label>
        </div>

        <button type="submit">Create Post</button>
    </form>
</body>

</html>
