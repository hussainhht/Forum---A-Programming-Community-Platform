<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Home</title>
</head>
<body>
    <h1>Welcome to the Forum</h1>

    {{range .}}
        <article>
            <h2>{{.Title}}</h2>
            <p>{{.Content}}</p>
            <small>Posted by {{.Author}}</small>
        </article>
        <hr>
    {{else}}
        <p>No posts yet!</p>
    {{end}}
</body>
</html>
