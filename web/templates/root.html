<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../static/css/root.css">
</head>

<body id="root-body">
    <nav id="sidebar">
        <div class="sidebar-container">

            <input hidden type="checkbox" name="sidebar-toggle" id="sidebar-toggle">
            <div id="sidebar-sections-container">
                <section class="sidebar-section" id="sidebar-header-section">
                    <div class="sidebar-header-container sidebar-section-container">
                        <label id="sidebar-toggle-button" class="sidebar-button" for="sidebar-toggle"><img
                                class="sidebar-button-icon" src="../static/icons/menu.svg" alt=""></label>
                    </div>
                </section>
                <!-- <section class="sidebar-section" id="sidebar-profile-section">
                    <div class="sidebar-profile-container sidebar-section-container">
                        <div class="sidebar-profile-img-container">
                            <img src="" alt="User profile image">
                        </div>
                        <div class="sidebar-profile-username-container">
                            <span class="sidebar-profile-username-text sidebar-text sidebar-button-text">Balafoo</span>
                        </div>
                    </div>
                </section> -->
                <section class="sidebar-section" id="sidebar-main-section">
                    <div class="sidebar-main-container sidebar-section-container">
                        <button class="sidebar-button" onclick="location.href='/'"><img class="sidebar-button-icon"
                                src="../static/icons/home.svg" alt=""><span
                                class="sidebar-button-text sidebar-text">Home</span></button>
                        <button class="sidebar-button" onclick="location.href='/create-post'"><img
                                class="sidebar-button-icon" src="../static/icons/add_post.svg" alt=""><span
                                class="sidebar-button-text sidebar-text">Create&nbsp;Post</span></button>
                        <button class="sidebar-button" onclick="location.href='/posts'"><img class="sidebar-button-icon"
                                src="../static/icons/read_more.svg" alt=""><span
                                class="sidebar-button-text sidebar-text">Discover&nbsp;Posts</span></button>
                    </div>
                </section>
                <section class="sidebar-section" id="sidebar-categories-section">
                    <div class="sidebar-categories-container sidebar-section-container">
                        <button class="sidebar-button"><span
                                class="sidebar-button-text sidebar-text">Categories</span><img
                                class="sidebar-button-icon" src="../static/icons/arrow_right.svg" alt=""></button>
                        <button class="sidebar-button" onclick="location.href='/category/1'"><img
                                class="sidebar-button-icon" src="../static/icons/go.svg" alt=""><span
                                class="sidebar-button-text sidebar-text">Go&nbsp;Lang</span></button>
                        <button class="sidebar-button" onclick="location.href='/category/2'"><img
                                class="sidebar-button-icon" src="../static/icons/rust.png" alt=""><span
                                class="sidebar-button-text sidebar-text">Rust</span></button>
                        <button class="sidebar-button" onclick="location.href='/category/3'"><img
                                class="sidebar-button-icon" src="../static/icons/javascript.svg" alt=""><span
                                class="sidebar-button-text sidebar-text">JavaScript</span></button>
                        <button class="sidebar-button" onclick="location.href='/category/4'"><img
                                class="sidebar-button-icon" src="../static/icons/arrow_down.svg" alt=""><span
                                class="sidebar-button-text sidebar-text">View&nbsp;More</span></button>
                    </div>
                </section>
                <section class="sidebar-section" id="sidebar-auth-section">
                    <div class="sidebar-auth-container sidebar-section-container">
                        <button class="sidebar-button"><img class="sidebar-button-icon" src="../static/icons/login.svg"
                                alt=""> <span class="sidebar-button-text sidebar-text">Login&nbsp;In</span></button>
                        <button class="sidebar-button"><img class="sidebar-button-icon"
                                src="../static/icons/register.svg" alt=""> <span
                                class="sidebar-button-text sidebar-text">Register</span></button>
                        <button class="sidebar-button"><img class="sidebar-button-icon" src="../static/icons/logout.svg"
                                alt=""> <span class="sidebar-button-text sidebar-text">Logout</span></button>

                    </div>
                </section>
                <section class="sidebar-section" id="sidebar-footer-section">
                    <div class="sidebar-footer-container sidebar-section-container">
                        <button class="sidebar-button"><img class="sidebar-button-icon"
                                src="../static/icons/settings.svg" alt=""> <span
                                class="sidebar-button-text sidebar-text">Settings</span></button>
                        <button class="sidebar-button"><img class="sidebar-button-icon" src="../static/icons/help.svg"
                                alt=""> <span class="sidebar-button-text sidebar-text">Help</span></button>
                        <button class="sidebar-button"><img class="sidebar-button-icon" src="../static/icons/policy.svg"
                                alt=""> <span
                                class="sidebar-button-text sidebar-text">Privacy&nbsp;Policy</span></button>
                        <button class="sidebar-button"><img class="sidebar-button-icon" src="../static/icons/terms.svg"
                                alt=""> <span
                                class="sidebar-button-text sidebar-text">Terms&nbsp;of&nbsp;Service</span></button>
                    </div>
                </section>
            </div>
        </div>
    </nav>

    <main>
        <div id="main-container">
            {{template "main" .}}
        </div>
    </main>
</body>

</html>
