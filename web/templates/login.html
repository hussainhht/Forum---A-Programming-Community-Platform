<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/web/static/css/login.css">

</head>

<body>



    <div class="main-card">


        <div class="logos">
            <div class="welcome">
                <h1>Welcome To Coding Forum</h1>
            </div>

            <div class="logo-rotator" aria-label="Tech logos">
                <img src="/web/static/img/logos.png" alt="" class="slide s1">
                <img src="/web/static/img/golang.png" alt="" class="slide s2">
                <img src="/web/static/img/javascribt.png" alt="" class="slide s3">
                <img src="/web/static/img/bithon.png" alt="" class="slide s4">
                <img src="/web/static/img/neonjava.png" alt="" class="slide s5">
                <img src="/web/static/img/rust.png" alt="" class="slide s6">
                <img src="/web/static/img/ruby.png" alt="" class="slide s7">
                <img src="/web/static/img/c++.png" alt="" class="slide s8">
                <img src="/web/static/img/csharp.png" alt="" class="slide s9">
                <img src="/web/static/img/c.png" alt="" class="slide s10">
            </div>

        </div>

        <div class="login-container">
            <div class="login-header">
                <h2>Login</h2>
            </div>

            <form method="POST" action="/login">

                <div class="inputbox">
                    <input type="text" id="emailORUsername" name="emailORUsername" required>
                    <span>Email or Username</span>
                    <i></i>
                </div>

                <div class="inputbox">
                    <input type="password" id="password" name="password" required>
                    <span>Password</span>
                    <i></i>
                </div>

                <div class="form-actions">
                    <button type="submit">Login</button>
                </div>

                <div class="form-footer">
                    <p>Don't have an account? <a href="/register">Register here</a>.</p>
                </div>

                {{if .Error}}
                <div class="error-box">{{.Error}}</div>
                {{end}}
            </form>


        </div>

    </div>



</body>

</html>
