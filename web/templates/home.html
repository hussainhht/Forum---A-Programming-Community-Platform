<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/web/static/css/newtyles.css">
</head>

<body>
    <div class="background">

    </div>
    <div class="sidebar sidebar-left">
        <div class="sidebar-container">
            <div class="sidebar-profile">
                <div class="sidebar-profile-img-container"><svg role="img" width="24px" height="24px"
                        viewBox="0 0 24 24" aria-label="icon">
                        <path fill-rule="evenodd" clip-rule="evenodd"
                            d="M6.8 3.6c.4 0 .8-.3.8-.8 0-.4-.4-.8-.8-.8-.5 0-.9.4-.9.8 0 .5.4.8.9.8Zm0 1h.7L8.9 6h-6v1.8H1v6.7h1.9v1.5h4.9v1.8H1V23h22v-5h-6.8v-2h5v-1.4H23V8h-1.9V6.1H15l1.4-1.5h.5c1 0 1.9-.8 1.9-1.8S17.9 1 16.8 1c-1 0-1.8.8-1.8 1.8 0 .5.1.9.4 1.2l-1.9 2h-3.2L8.3 4A1.8 1.8 0 0 0 6.8 1c-1 0-1.9.8-1.9 1.8s.8 1.9 1.9 1.9ZM20 7.2H4v8H20V7ZM7.8 19H22v3H2v-3h5.8Zm7.4-1v-1.6H8.8v1.6h6.4ZM2.6 9H2v4.7h.6V9Zm18.8 0h.6v4.7h-.6V9ZM8 11.4c.7 0 1.2-.6 1.2-1.2 0-.7-.5-1.3-1.2-1.3s-1.2.6-1.2 1.3c0 .6.5 1.2 1.2 1.2Zm0 1c1.2 0 2.3-1 2.3-2.2 0-1.3-1-2.3-2.3-2.3-1.3 0-2.3 1-2.3 2.3 0 1.2 1 2.2 2.3 2.2Zm9.4-2.2c0 .6-.5 1.2-1.3 1.2s-1.3-.6-1.3-1.2c0-.7.5-1.3 1.3-1.3s1.3.6 1.3 1.3Zm1 0c0 1.2-1 2.2-2.3 2.2-1.3 0-2.4-1-2.4-2.2 0-1.3 1.1-2.3 2.4-2.3 1.3 0 2.4 1 2.4 2.3Zm-7.9 3-.2-.6-1 .4.5 1.1h4.5l.4-1.1-1-.3-.2.4h-3Zm7.2-10.4c0 .5-.4.8-.9.8a.8.8 0 0 1-.8-.8c0-.4.4-.8.8-.8.5 0 .9.4.9.8Z"
                            fill="var(--purple)"></path>
                    </svg>
                </div>
                <div class="sidebar-profile-username">Balafoo</div>
            </div>
            <div class="sidebar-home"></div>
        </div>
    </div>
    <main>
        <div id="main-container">
            <section id="hero-section">
                <div class="hero-container">
                    <h1 class="hero-title">Welcome to Null Pointer</h1>
                    <p class="hero-subtitle">Discuss, share, and connect with others.</p>
                </div>
            </section>
            <section id="posts-section">
                <h2 class="section-title">Featured Posts</h2>
                <div class="posts-container">
                    {{range .Posts}}
                    <div class="post-card">
                        <div class="post-titlebar">
                            <div class="post-title">{{.Title}}</div>
                            <div class="post-toolbar-buttons">
                                <button class="minimize">
                                    <svg viewBox="0 0 10 10">
                                        <rect x="1" y="4" width="8" height="2" />
                                    </svg>
                                </button>
                                <button class="maximize">
                                    <svg viewBox="0 0 10 10">
                                        <rect x="1" y="1" width="8" height="8" />
                                    </svg>
                                </button>
                                <button class="close">
                                    <svg viewBox="0 0 10 10">
                                        <polygon points="1,1 9,9 9,1 1,9" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="post-body">
                            <div class="post-content">{{.Preview}}</div>
                            <div class="post-info"><small>Posted by {{.Username}} on {{.CreatedAt.Format "2006-01-02 15:04"}}</small></div>
                        </div>
                    </div>
                    {{else}}
                    <p>No posts found.</p>
                    {{end}}
                </div>
            </section>
        </div>
    </main>
</body>

</html>
