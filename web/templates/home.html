<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/web/static/css/newtyles.css">
</head>

<body>
    <div class="sidebar sidebar-left">
        <div class="sidebar-options">
            <form action="" class="sidebar-form">
                <label for="left-sidebar-option1"><input type="radio" name="sidebar-option"
                        id="left-sidebar-option1">Home</label>
                <label for="left-sidebar-option2"><input type="radio" name="sidebar-option"
                        id="left-sidebar-option2">Create Post</label>
                <label for="left-sidebar-option3"><input type="radio" name="sidebar-option"
                        id="left-sidebar-option3">View Posts</label>
                <label for="left-sidebar-option4"><input type="radio" name="sidebar-option"
                        id="left-sidebar-option4">Lorem, ipsum.</label>
                <label for="left-sidebar-option5"><input type="radio" name="sidebar-option"
                        id="left-sidebar-option5">Lorem.</label>
            </form>
        </div>
    </div>
    <main>
        <div id="main-container">
            <section id="hero-section">
                <div class="hero-container">
                    <h1 class="hero-title">Welcome to Null Pointer</h1>
                    <p class="hero-subtitle">Discuss, share, and connect with others.</p>
                </div>
            </section>
            <section id="posts-section">
                <h2 class="section-title">Featured Posts</h2>
                <div class="posts-container">
                    {{range .Posts}}
                    <div class="post-card">
                        <div class="post-titlebar">
                            <div class="post-title">{{.Title}}</div>
                            <div class="post-toolbar-buttons">
                                <button class="minimize">
                                    <svg viewBox="0 0 10 10">
                                        <rect x="1" y="4" width="8" height="2" />
                                    </svg>
                                </button>
                                <button class="maximize">
                                    <svg viewBox="0 0 10 10">
                                        <rect x="1" y="1" width="8" height="8" />
                                    </svg>
                                </button>
                                <button class="close">
                                    <svg viewBox="0 0 10 10">
                                        <polygon points="1,1 9,9 9,1 1,9" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="post-body">
                            <div class="post-content">{{.Preview}}</div>
                            <div class="post-info"><small>Posted by {{.Username}} on {{.CreatedAt.Format "2006-01-02 15:04"}}</small></div>
                        </div>

                    </div>
                    {{else}}
                    <p>No posts found.</p>
                    {{end}}
                </div>
            </section>
        </div>
    </main>
    <div class="sidebar sidebar-right">
        <div class="sidebar-options">
            <form action="" class="sidebar-form">
                <label for="right-sidebar-option3"><input type="radio" name="sidebar-option"
                        id="right-sidebar-option3">profile</label>
                <label for="right-sidebar-option1"><input type="radio" name="sidebar-option"
                        id="right-sidebar-option1">login</label>
                <label for="right-sidebar-option2"><input type="radio" name="sidebar-option"
                        id="right-sidebar-option2">register</label>

            </form>
        </div>
    </div>
</body>

</html>
