<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="/web/static/css/login.css" />
  </head>

  <body>
    <div class="bg-rotator" aria-hidden="true">
      <div
        class="slide"
        style="--bg: url('/web/static/img/bg-tech.png'); --i: 0"
      ></div>
      <div
        class="slide"
        style="--bg: url('/web/static/img/bg-tech2.png'); --i: 1"
      ></div>
    </div>

    <div class="main-card">
      <div class="logos">
        <div class="welcome">
          <h1>Welcome To Coding Forum</h1>
        </div>

        <div class="logo-rotator" aria-label="Tech logos">
          <img src="/web/static/login-img/logos.png" alt="" class="slide s1" />
          <img src="/web/static/login-img/golang.png" alt="" class="slide s2" />
          <img
            src="/web/static/login-img/javascribt.png"
            alt=""
            class="slide s3"
          />
          <img src="/web/static/login-img/bithon.png" alt="" class="slide s4" />
          <img
            src="/web/static/login-img/neonjava.png"
            alt=""
            class="slide s5"
          />
          <img src="/web/static/login-img/rust.png" alt="" class="slide s6" />
          <img src="/web/static/login-img/ruby.png" alt="" class="slide s7" />
          <img src="/web/static/login-img/c++.png" alt="" class="slide s8" />
          <img src="/web/static/login-img/csharp.png" alt="" class="slide s9" />
          <img src="/web/static/login-img/c.png" alt="" class="slide s10" />
          <img src="/web/static/login-img/bash.png" alt="" class="slide s11" />
          <img src="/web/static/login-img/Flutter.png" alt="" class="slide s12" />
        </div>
      </div>

      <div class="login-container">
        <div class="login-header">
          <h2>Register</h2>
        </div>

  <form method="POST" action="/register" enctype="multipart/form-data">

          <div class="inputbox">
            <input type="file" id="profile-img" name="profile-img" accept="image/*" />
            <span>Upload Photo</span>
            <i></i>
          </div>

          <div class="inputbox">
            <input
              type="text"
              id="fullname"
              name="fullname"
              value="{{.Form.FullName}}"
              required
              maxlength="80"
            />
            <span>Full Name</span>
            <i></i>
          </div>
          

          <div class="inputbox">
            <input type="text" id="username" name="username" required minlength="3" maxlength="20" value="{{.Form.Username}}" />
            <span>Username</span>
            <i></i>
          </div>

          <div class="inputbox">
            <input type="email" id="email" name="email" required value="{{.Form.Email}}" />
            <span>Email</span>
            <i></i>
          </div>

          <div class="inputbox">
            <!-- Hidden checkbox to store state -->
            <input type="checkbox" id="togglePassword" class="pw-toggle" tabindex="-1" aria-hidden="true" />

            <!-- Actual password field (CSS-only masking) -->
            <input
              type="text"
              id="password"
              name="password"
              required
              minlength="1"
              autocomplete="new-password"
            />
            <span>Password</span>

            <!-- Clickable eye toggle -->
            <label class="eye-toggle" for="togglePassword" aria-label="Show password">
              <svg class="eye" xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 576 512"><path d="M288 32c-80.8 0-145.5 36.8-192.6 80.6C48.6 156 17.3 208 2.5 243.7c-3.3 7.9-3.3 16.7 0 24.6C17.3 304 48.6 356 95.4 399.4C142.5 443.2 207.2 480 288 480s145.5-36.8 192.6-80.6c46.8-43.5 78.1-95.4 93-131.1c3.3-7.9 3.3-16.7 0-24.6c-14.9-35.7-46.2-87.7-93-131.1C433.5 68.8 368.8 32 288 32zM144 256a144 144 0 1 1 288 0 144 144 0 1 1 -288 0z"/></svg>
              <svg class="eye-slash" xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 640 512"><path d="M38.8 5.1C28.4-3.1 13.3-1.2 5.1 9.2S-1.2 34.7 9.2 42.9l592 464c10.4 8.2 25.5 6.3 33.7-4.1s6.3-25.5-4.1-33.7L525.6 386.7c39.6-40.6 66.4-86.1 79.9-118.4c3.3-7.9 3.3-16.7 0-24.6c-14.9-35.7-46.2-87.7-93-131.1C465.5 68.8 400.8 32 320 32c-68.2 0-125 26.3-169.3 60.8L38.8 5.1zM223.1 149.5C248.6 126.2 282.7 112 320 112c79.5 0 144 64.5 144 144c0 24.9-6.3 48.3-17.4 68.7L408 294.5c8.4-19.3 10.6-41.4 4.8-63.3c-11.1-41.5-47.8-69.4-88.6-71.1c-5.8-.2-9.2 6.1-7.4 11.7c2.1 6.4 3.3 13.2 3.3 20.3c0 10.2-2.4 19.8-6.6 28.3l-90.3-70.8zM373 389.9c-16.4 6.5-34.3 10.1-53 10.1c-79.5 0-144-64.5-144-144c0-6.9 .5-13.6 1.4-20.2L83.1 161.5C60.3 191.2 44 220.8 34.5 243.7c-3.3 7.9-3.3 16.7 0 24.6c14.9 35.7 46.2 87.7 93 131.1C174.5 443.2 239.2 480 320 480c47.8 0 89.9-12.9 126.2-32.5L373 389.9z"/></svg>
            </label>
          </div>

          <div class="inputbox pw-gap">
            <!-- Hidden checkbox to store state -->
            <input type="checkbox" id="toggleConfirmPassword" class="pw-toggle" tabindex="-1" aria-hidden="true" />

            <!-- Actual confirm password field (CSS-only masking) -->
            <input
              type="text"
              id="confirmPassword"
              name="confirmPassword"
              required
              autocomplete="new-password"
            />
            <span>Confirm Password</span>

            <!-- Clickable eye toggle -->
            <label class="eye-toggle" for="toggleConfirmPassword" aria-label="Show confirm password">
              <svg class="eye" xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 576 512"><path d="M288 32c-80.8 0-145.5 36.8-192.6 80.6C48.6 156 17.3 208 2.5 243.7c-3.3 7.9-3.3 16.7 0 24.6C17.3 304 48.6 356 95.4 399.4C142.5 443.2 207.2 480 288 480s145.5-36.8 192.6-80.6c46.8-43.5 78.1-95.4 93-131.1c3.3-7.9 3.3-16.7 0-24.6c-14.9-35.7-46.2-87.7-93-131.1C433.5 68.8 368.8 32 288 32zM144 256a144 144 0 1 1 288 0 144 144 0 1 1 -288 0z"/></svg>
              <svg class="eye-slash" xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 640 512"><path d="M38.8 5.1C28.4-3.1 13.3-1.2 5.1 9.2S-1.2 34.7 9.2 42.9l592 464c10.4 8.2 25.5 6.3 33.7-4.1s6.3-25.5-4.1-33.7L525.6 386.7c39.6-40.6 66.4-86.1 79.9-118.4c3.3-7.9 3.3-16.7 0-24.6c-14.9-35.7-46.2-87.7-93-131.1C465.5 68.8 400.8 32 320 32c-68.2 0-125 26.3-169.3 60.8L38.8 5.1zM223.1 149.5C248.6 126.2 282.7 112 320 112c79.5 0 144 64.5 144 144c0 24.9-6.3 48.3-17.4 68.7L408 294.5c8.4-19.3 10.6-41.4 4.8-63.3c-11.1-41.5-47.8-69.4-88.6-71.1c-5.8-.2-9.2 6.1-7.4 11.7c2.1 6.4 3.3 13.2 3.3 20.3c0 10.2-2.4 19.8-6.6 28.3l-90.3-70.8zM373 389.9c-16.4 6.5-34.3 10.1-53 10.1c-79.5 0-144-64.5-144-144c0-6.9 .5-13.6 1.4-20.2L83.1 161.5C60.3 191.2 44 220.8 34.5 243.7c-3.3 7.9-3.3 16.7 0 24.6c14.9 35.7 46.2 87.7 93 131.1C174.5 443.2 239.2 480 320 480c47.8 0 89.9-12.9 126.2-32.5L373 389.9z"/></svg>
            </label>
          </div>

          <div class="form-actions">
            <button type="submit">Register</button>
          </div>

          <div class="form-footer">
            <p>Already have an account? <a href="/login">Login here</a>.</p>
          </div>

          {{if .Error}}
          <div class="error-box">{{.Error}}</div>
          {{end}}
        </form>
      </div>
    </div>
  </body>
</html>
