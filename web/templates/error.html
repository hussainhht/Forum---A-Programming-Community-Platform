<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{.Code}} — {{.Title}}</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="/static/css/err.css">
  </head>
  <body>
    <main class="card" role="alert" aria-live="polite">
      <div class="row">
        <span class="badge">Forum</span>
        <span class="badge">{{.Code}}</span>
        <span class="badge">{{.Title}}</span>
      </div>

      <h1>{{.Message}}</h1>
      <p class="lead">{{.Subtitle}}</p>

      <section class="term" aria-label="terminal">
        <div class="prompt" aria-hidden="false">
          <div class="host">visitor@forum</div>
          <div class="path">:~/</div>
          <div class="dollar">$</div>
          <div class="typewrap" aria-live="polite">
            <!-- server injects CLIHint directly; CSS reveals it -->
            <span class="type">{{.CLIHint}}</span>
          </div>
        </div>

        <!-- controls are normal links or a GET form (no JS) -->
        <div class="controls" role="navigation"
          aria-label="quick links">
          <a class="btn" href="/">← Home</a>
          <a class="btn" href="/posts">Discover</a>
          <a class="btn" href="/login">Login</a>
        </div>

        <form class="search" method="get" action="/posts" role="search"
          aria-label="search posts">
          <input type="search" name="q"
            placeholder="Search posts… (press Enter)"
            aria-label="Search posts" value="{{.Query}}">
          <input type="hidden" name="fromError" value="1">
          <input type="submit" value="Search">
        </form>

        <div class="meta">
          Request ID: <strong>{{.RequestID}}</strong> • Path:
          <code>{{.Path}}</code> • Method: {{.Method}}
        </div>
      </section>

    </main>
  </body>
</html>
